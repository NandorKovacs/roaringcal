<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Availability Calendar</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #333;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        .header {
            padding: 10px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #0056b3;
        }
        p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            color: #666;
        }
        iframe {
            flex-grow: 1;
            width: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Availability Calendar</h1>
            <p>Non-exhaustive list of days when I am generally *not* available for big commitments. Only here to make organisatorial stuff easier, i do not promise to be free on non blocked days, and also do not promise that my plans dont change.</p>
            <p id="last-updated-text" style="font-size: 0.8rem; color: #888; margin-top: 5px;">Last updated: <span id="last-updated-value">Loading...</span></p>
        </div>
        <iframe src="https://calendar.google.com/calendar/embed?src=2c43386eba367e18af5d1014e21563778f9a2aa22f0ef4df0b4883578f976569%40group.calendar.google.com&ctz=Europe%2FZurich" frameborder="0" scrolling="no"></iframe>
    </div>
    <script>
        async function fetchLastUpdated() {
            try {
                const response = await fetch('http://localhost:8000/last-updated');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                if (data.last_updated) {
                    const date = new Date(data.last_updated);
                    document.getElementById('last-updated-value').textContent = date.toLocaleString();
                } else {
                    document.getElementById('last-updated-value').textContent = 'N/A';
                }
            } catch (error) {
                console.error('Error fetching last updated time:', error);
                document.getElementById('last-updated-value').textContent = 'Could not fetch';
            }
        }
        fetchLastUpdated();
    </script>
</body>
</html>
